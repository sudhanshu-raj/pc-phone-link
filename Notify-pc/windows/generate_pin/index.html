<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate PIN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="screen" aria-label="Generate PIN">
      <header class="topbar">
        <div class="brand">App Logo</div>
        <!-- <div class="name">App Name</div> -->
      </header>

      <section class="pinContainer" aria-label="Generated PIN">
        <div class = "re-generate">
          <img src="./img/refresh-arrow.png" alt="re-generate">
        </div>
        <div class="pinbox">
          <input class="pin one" type="number" value="9" readonly>
          <input class="pin two" type="number" value="1" readonly>
          <input class="pin three" type="number" value="6" readonly>
          <input class="pin four" type="number" value="3" readonly>
        </div>
      </section>

      <section class="copy">
        <h1>Verify Your Device</h1>
        <p class="lead">Enter the same pin on your phone to complete the connection</p>
        <!-- <p class="hint">Make sure both are on same wifi</p> -->
      </section>

      <button class="back-btn" type="button" aria-label="Back">
        <span class="back-arrow">‹</span>
      </button>
    </section>

  </body>
</html>
